on:
  push:
    branches:
      - main
  pull_request:
    branches: '*'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

name: Project check
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2

    - name: Set up Node.js
      uses: actions/setup-node@v4.2.0
      with:
        node-version: '22' # Апдейт до вашей локальной версии Node.js

    - name: Install dependencies
      run: npm install

    - name: Run checks
      run: npm run lint

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: check

    # ФИКС: Прописываем права строго внутри самой работы build
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22' # Апдейт до вашей локальной версии Node.js

      - name: Install dependencies
        run: |
          npm config set package-lock false
          npm install

      - name: Build Project
        run: npm run build

      - name: Setup pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ./build # Убедитесь, что ваш сборщик создает именно папку build, а не dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
